<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-OCR — Распознавание текста</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent: #00d4ff;
            --accent-dim: #0099cc;
            --success: #00ff88;
            --error: #ff4757;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border: #2a2a4a;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        
        .status-dot.ready {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }
        
        .status-dot.error {
            background: var(--error);
            box-shadow: 0 0 8px var(--error);
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }
        
        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .panel-content {
            flex: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        /* Upload Panel */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
        }
        
        .upload-zone.has-image {
            display: none;
        }
        
        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .upload-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .upload-hint {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            opacity: 0.7;
        }
        
        #file-input {
            display: none;
        }
        
        #preview-container {
            display: none;
            flex: 1;
            min-height: 0;
        }
        
        #preview-container.show {
            display: flex;
            flex-direction: column;
        }
        
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            flex: 1;
        }
        
        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: var(--text-primary);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }
        
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: none;
        }
        
        /* Result Panel */
        #result-text {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            flex: 1;
            overflow-y: auto;
            color: var(--text-primary);
        }
        
        #result-text::-webkit-scrollbar {
            width: 6px;
        }
        
        #result-text::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        #result-text::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .progress {
            display: none;
            margin-top: 0.75rem;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            width: 0%;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        .error-box {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--error);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--error);
            font-size: 0.9rem;
            display: none;
            margin-top: 0.75rem;
        }
        
        .error-box.show {
            display: block;
        }
        
        footer {
            text-align: center;
            padding: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .panel-content {
                min-height: 300px;
            }
        }
        
        @media (min-width: 1600px) {
            .container {
                max-width: 1600px;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            #result-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 GLM-OCR</h1>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Проверка сервера...</span>
            </div>
        </header>
        
        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">📷 Изображение</div>
                <div class="panel-content">
                    <div class="upload-zone" id="upload-zone">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Перетащите или нажмите для выбора</div>
                        <div class="upload-hint">PNG, JPG, WebP, GIF, PDF • до 50MB</div>
                        <input type="file" id="file-input" accept="image/*,.pdf,application/pdf">
                    </div>
                    <div id="preview-container">
                        <img id="preview-image" alt="Предпросмотр">
                    </div>
                    <div id="pdf-container" style="display:none;">
                        <div class="pdf-info" id="pdf-info"></div>
                        <div class="pdf-pages" id="pdf-pages"></div>
                    </div>
                    <div class="btn-row">
                        <button class="btn" id="process-btn" disabled>🔍 Распознать</button>
                        <button class="btn btn-secondary" id="clear-btn" style="display:none">✕ Очистить</button>
                    </div>
                    <div class="progress" id="progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="error-box" id="error-box"></div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">📝 Результат</div>
                <div class="panel-content">
                    <div id="result-text" style="color: var(--text-secondary); font-style: italic;">
                        Загрузите изображение для распознавания текста
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-secondary" id="copy-btn" disabled>📋 Копировать</button>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            Powered by <a href="https://github.com/ggml-org/llama.cpp" target="_blank">llama.cpp</a> + <a href="https://huggingface.co/ggml-org/GLM-OCR-GGUF" target="_blank">GLM-OCR</a>
        </footer>
    </div>
    
    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const pdfContainer = document.getElementById('pdf-container');
        const previewImage = document.getElementById('preview-image');
        const processBtn = document.getElementById('process-btn');
        const clearBtn = document.getElementById('clear-btn');
        const progress = document.getElementById('progress');
        const resultText = document.getElementById('result-text');
        const errorBox = document.getElementById('error-box');
        const copyBtn = document.getElementById('copy-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let selectedFile = null;
        
        // Health check - actually verify llama-server is ready
        async function checkHealth() {
            try {
                const res = await fetch('/api/health', { signal: AbortSignal.timeout(5000) });
                if (res.ok) {
                    statusDot.classList.add('ready');
                    statusDot.classList.remove('error');
                    statusText.textContent = 'Сервер готов';
                    return;
                }
            } catch (e) {}
            
            statusDot.classList.remove('ready');
            statusText.textContent = 'Сервер запускается...';
            setTimeout(checkHealth, 2000);
        }
        
        checkHealth();
        
        // Drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            uploadZone.addEventListener(event, e => { e.preventDefault(); e.stopPropagation(); });
        });
        
        ['dragenter', 'dragover'].forEach(event => {
            uploadZone.addEventListener(event, () => uploadZone.classList.add('dragover'));
        });
        
        ['dragleave', 'drop'].forEach(event => {
            uploadZone.addEventListener(event, () => uploadZone.classList.remove('dragover'));
        });
        
        uploadZone.addEventListener('drop', e => {
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        
        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif', 'application/pdf'];
            if (!validTypes.includes(file.type) && !file.name.toLowerCase().endsWith('.pdf')) {
                showError('Выберите изображение или PDF');
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                showError('Файл слишком большой (макс. 20MB)');
                return;
            }
            
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                previewContainer.classList.add('show');
                uploadZone.style.display = 'none';
                processBtn.disabled = false;
                clearBtn.style.display = 'block';
                hideError();
                resultText.style.color = 'var(--text-secondary)';
                resultText.style.fontStyle = 'italic';
                resultText.textContent = 'Нажмите "Распознать" для обработки';
                copyBtn.disabled = true;
            };
            reader.readAsDataURL(file);
        }
        
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            previewContainer.classList.remove('show');
            uploadZone.style.display = 'flex';
            processBtn.disabled = true;
            clearBtn.style.display = 'none';
            resultText.style.color = 'var(--text-secondary)';
            resultText.style.fontStyle = 'italic';
            resultText.textContent = 'Загрузите изображение для распознавания текста';
            copyBtn.disabled = true;
        });
        
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            processBtn.disabled = true;
            clearBtn.disabled = true;
            progress.classList.add('show');
            hideError();
            resultText.style.color = 'var(--text-secondary)';
            resultText.style.fontStyle = 'italic';
            resultText.textContent = 'Обработка...';
            
            try {
                const res = await fetch('/api/ocr', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    resultText.style.color = 'var(--text-primary)';
                    resultText.style.fontStyle = 'normal';
                    resultText.textContent = data.text || 'Текст не распознан';
                    copyBtn.disabled = false;
                } else {
                    showError(data.error || 'Ошибка распознавания');
                    resultText.textContent = 'Ошибка';
                }
            } catch (e) {
                showError('Ошибка соединения: ' + e.message);
                resultText.textContent = 'Ошибка';
            } finally {
                processBtn.disabled = false;
                clearBtn.disabled = false;
                progress.classList.remove('show');
            }
        });
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(resultText.textContent).then(() => {
                copyBtn.textContent = '✓ Скопировано';
                setTimeout(() => copyBtn.textContent = '📋 Копировать', 1500);
            });
        });
        
        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('show');
        }
        
        function hideError() {
            errorBox.classList.remove('show');
        }
    </script>
</body>
</html>
