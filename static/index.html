<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-OCR — Распознавание текста</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --glass-tint: rgba(20, 20, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-border-light: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.75);
            --text-muted: rgba(255, 255, 255, 0.5);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #0a0a12;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }
        
        .bg-blob-1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }
        
        .bg-blob-2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }
        
        .bg-blob-3 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }
        
        /* Glass effect */
        .glass {
            background: var(--glass-tint);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }
        
        /* Inner glass reflection */
        .glass::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1) 0%,
                transparent 50%
            );
            pointer-events: none;
        }
        
        /* Glass top highlight */
        .glass::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            pointer-events: none;
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-icon {
            font-size: 1.75rem;
            filter: drop-shadow(0 0 8px var(--accent-cyan));
        }
        
        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            border: 1px solid var(--glass-border-light);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }
        
        .status-dot.ready {
            background: var(--accent-cyan);
            box-shadow: 0 0 12px var(--accent-cyan), 0 0 24px rgba(0, 212, 255, 0.4);
        }
        
        .status-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }
        
        /* Panel */
        .panel {
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
        }
        
        .panel-header {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        
        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        /* Upload Zone */
        .upload-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }
        
        .upload-zone.has-image {
            display: none;
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            opacity: 0.8;
        }
        
        .upload-text {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .upload-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        #file-input {
            display: none;
        }
        
        #preview-container {
            display: none;
            flex: 1;
            min-height: 0;
        }
        
        #preview-container.show {
            display: flex;
            flex-direction: column;
        }
        
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            flex: 1;
        }
        
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn:hover:not(:disabled)::before {
            opacity: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: white;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border-light);
            color: var(--text-secondary);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* Progress */
        .progress {
            display: none;
            margin-top: 1rem;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            width: 0%;
            animation: progress 2s ease-in-out infinite;
            border-radius: 2px;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        /* Error */
        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 0.875rem 1rem;
            background: rgba(255, 71, 87, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            color: #ff6b6b;
            font-size: 0.9rem;
        }
        
        .error-box.show {
            display: block;
        }
        
        /* Result */
        #result-text {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border-light);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            color: var(--text-primary);
        }
        
        #result-text::-webkit-scrollbar {
            width: 8px;
        }
        
        #result-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        #result-text::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        #result-text::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        footer a:hover {
            color: var(--accent-purple);
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            header {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
        
        @media (min-width: 1600px) {
            .container {
                max-width: 1600px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    
    <div class="container">
        <header class="glass">
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">GLM-OCR</span>
            </div>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span class="status-text" id="status-text">Проверка сервера...</span>
            </div>
        </header>
        
        <div class="main-grid">
            <div class="panel glass">
                <div class="panel-header">📷 Изображение</div>
                <div class="panel-content">
                    <div class="upload-zone" id="upload-zone">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Перетащите или нажмите</div>
                        <div class="upload-hint">PNG, JPG, WebP, GIF • до 20MB</div>
                        <input type="file" id="file-input" accept="image/*">
                    </div>
                    <div id="preview-container">
                        <img id="preview-image" alt="Предпросмотр">
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-primary" id="process-btn" disabled>🔍 Распознать</button>
                        <button class="btn btn-secondary" id="clear-btn" style="display:none">✕</button>
                    </div>
                    <div class="progress" id="progress">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                    </div>
                    <div class="error-box" id="error-box"></div>
                </div>
            </div>
            
            <div class="panel glass">
                <div class="panel-header">📝 Результат</div>
                <div class="panel-content">
                    <div id="result-text">Загрузите изображение для распознавания</div>
                    <div class="btn-row">
                        <button class="btn btn-secondary" id="copy-btn" disabled>📋 Копировать</button>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            Powered by <a href="https://github.com/ggml-org/llama.cpp" target="_blank">llama.cpp</a> + <a href="https://huggingface.co/ggml-org/GLM-OCR-GGUF" target="_blank">GLM-OCR</a>
        </footer>
    </div>
    
    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const processBtn = document.getElementById('process-btn');
        const clearBtn = document.getElementById('clear-btn');
        const progress = document.getElementById('progress');
        const resultText = document.getElementById('result-text');
        const errorBox = document.getElementById('error-box');
        const copyBtn = document.getElementById('copy-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let selectedFile = null;
        
        async function checkHealth() {
            try {
                const res = await fetch('/api/health', { signal: AbortSignal.timeout(5000) });
                if (res.ok) {
                    statusDot.classList.add('ready');
                    statusText.textContent = 'Сервер готов';
                    return;
                }
            } catch (e) {}
            statusDot.classList.remove('ready');
            statusText.textContent = 'Сервер запускается...';
            setTimeout(checkHealth, 2000);
        }
        checkHealth();
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => uploadZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }));
        uploadZone.addEventListener('dragover', () => uploadZone.classList.add('dragover'));
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => { if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) return showError('Нужен файл изображения');
            if (file.size > 20 * 1024 * 1024) return showError('Файл слишком большой');
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                previewContainer.classList.add('show');
                uploadZone.style.display = 'none';
                processBtn.disabled = false;
                clearBtn.style.display = 'block';
                hideError();
                resultText.textContent = 'Нажмите "Распознать"';
                copyBtn.disabled = true;
            };
            reader.readAsDataURL(file);
        }
        
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            previewContainer.classList.remove('show');
            uploadZone.style.display = 'flex';
            processBtn.disabled = true;
            clearBtn.style.display = 'none';
            resultText.textContent = 'Загрузите изображение';
            copyBtn.disabled = true;
        });
        
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            const formData = new FormData();
            formData.append('file', selectedFile);
            processBtn.disabled = true;
            clearBtn.disabled = true;
            progress.classList.add('show');
            hideError();
            resultText.textContent = 'Обработка...';
            try {
                const res = await fetch('/api/ocr', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    resultText.textContent = data.text || 'Текст не найден';
                    copyBtn.disabled = false;
                } else {
                    showError(data.error || 'Ошибка');
                    resultText.textContent = 'Ошибка';
                }
            } catch (e) {
                showError('Ошибка соединения');
                resultText.textContent = 'Ошибка';
            } finally {
                processBtn.disabled = false;
                clearBtn.disabled = false;
                progress.classList.remove('show');
            }
        });
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(resultText.textContent).then(() => {
                copyBtn.textContent = '✓ Скопировано';
                setTimeout(() => copyBtn.textContent = '📋 Копировать', 1500);
            });
        });
        
        function showError(msg) { errorBox.textContent = msg; errorBox.classList.add('show'); }
        function hideError() { errorBox.classList.remove('show'); }
    </script>
</body>
</html>
