<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-OCR — Распознавание текста</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a1a;
            --bg-deep: #050510;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-border-light: rgba(255, 255, 255, 0.25);
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --glow-cyan: rgba(0, 212, 255, 0.3);
            --glow-purple: rgba(168, 85, 247, 0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 60% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 10% 90%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: gradientShift 20s ease-in-out infinite alternate;
        }
        
        @keyframes gradientShift {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(5deg); }
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.25rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        /* Glass inner glow */
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-icon {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 10px var(--glow-cyan));
        }
        
        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 50%, var(--accent-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }
        
        .status-dot.ready {
            background: var(--accent-cyan);
            box-shadow: 0 0 12px var(--glow-cyan);
        }
        
        .status-dot.error {
            background: #ff4757;
            box-shadow: 0 0 12px rgba(255, 71, 87, 0.5);
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }
        
        /* Glass Panel */
        .panel {
            background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
            border-radius: inherit;
        }
        
        .panel-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        
        .panel-content {
            flex: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }
        
        /* Upload Zone */
        .upload-zone {
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            position: relative;
        }
        
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: inset 0 0 30px rgba(0, 212, 255, 0.05);
        }
        
        .upload-zone.has-image {
            display: none;
        }
        
        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.8;
        }
        
        .upload-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        
        .upload-hint {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        
        #file-input {
            display: none;
        }
        
        #preview-container {
            display: none;
            flex: 1;
            min-height: 0;
        }
        
        #preview-container.show {
            display: flex;
            flex-direction: column;
        }
        
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            flex: 1;
        }
        
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        
        .btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.08));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn:hover:not(:disabled)::before {
            opacity: 1;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }
        
        /* Progress */
        .progress {
            display: none;
            margin-top: 0.75rem;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            width: 0%;
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        /* Error */
        .error-box {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            padding: 0.75rem;
            color: #ff6b6b;
            font-size: 0.9rem;
            display: none;
            margin-top: 0.75rem;
            backdrop-filter: blur(10px);
        }
        
        .error-box.show {
            display: block;
        }
        
        /* Result */
        #result-text {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            flex: 1;
            overflow-y: auto;
            color: var(--text-primary);
        }
        
        #result-text::-webkit-scrollbar {
            width: 6px;
        }
        
        #result-text::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        
        #result-text::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        
        footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        footer a:hover {
            color: var(--accent-purple);
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .panel-content {
                min-height: 300px;
            }
            
            header {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
        
        @media (min-width: 1600px) {
            .container {
                max-width: 1600px;
            }
            
            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">GLM-OCR</span>
            </div>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Проверка сервера...</span>
            </div>
        </header>
        
        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">📷 Изображение</div>
                <div class="panel-content">
                    <div class="upload-zone" id="upload-zone">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Перетащите или нажмите для выбора</div>
                        <div class="upload-hint">PNG, JPG, WebP, GIF • до 20MB</div>
                        <input type="file" id="file-input" accept="image/*">
                    </div>
                    <div id="preview-container">
                        <img id="preview-image" alt="Предпросмотр">
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-primary" id="process-btn" disabled>🔍 Распознать</button>
                        <button class="btn btn-secondary" id="clear-btn" style="display:none">✕ Очистить</button>
                    </div>
                    <div class="progress" id="progress">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="error-box" id="error-box"></div>
                </div>
            </div>
            
            <div class="panel">
                <div class="panel-header">📝 Результат</div>
                <div class="panel-content">
                    <div id="result-text" style="color: var(--text-muted); font-style: italic;">
                        Загрузите изображение для распознавания текста
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-secondary" id="copy-btn" disabled>📋 Копировать</button>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            Powered by <a href="https://github.com/ggml-org/llama.cpp" target="_blank">llama.cpp</a> + <a href="https://huggingface.co/ggml-org/GLM-OCR-GGUF" target="_blank">GLM-OCR</a>
        </footer>
    </div>
    
    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const processBtn = document.getElementById('process-btn');
        const clearBtn = document.getElementById('clear-btn');
        const progress = document.getElementById('progress');
        const resultText = document.getElementById('result-text');
        const errorBox = document.getElementById('error-box');
        const copyBtn = document.getElementById('copy-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let selectedFile = null;
        
        // Health check - actually verify llama-server is ready
        async function checkHealth() {
            try {
                const res = await fetch('/api/health', { signal: AbortSignal.timeout(5000) });
                if (res.ok) {
                    statusDot.classList.add('ready');
                    statusDot.classList.remove('error');
                    statusText.textContent = 'Сервер готов';
                    return;
                }
            } catch (e) {}
            
            statusDot.classList.remove('ready');
            statusText.textContent = 'Сервер запускается...';
            setTimeout(checkHealth, 2000);
        }
        
        checkHealth();
        
        // Drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(event => {
            uploadZone.addEventListener(event, e => { e.preventDefault(); e.stopPropagation(); });
        });
        
        ['dragenter', 'dragover'].forEach(event => {
            uploadZone.addEventListener(event, () => uploadZone.classList.add('dragover'));
        });
        
        ['dragleave', 'drop'].forEach(event => {
            uploadZone.addEventListener(event, () => uploadZone.classList.remove('dragover'));
        });
        
        uploadZone.addEventListener('drop', e => {
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        
        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Выберите файл изображения');
                return;
            }
            if (file.size > 20 * 1024 * 1024) {
                showError('Файл слишком большой (макс. 20MB)');
                return;
            }
            
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                previewContainer.classList.add('show');
                uploadZone.style.display = 'none';
                processBtn.disabled = false;
                clearBtn.style.display = 'block';
                hideError();
                resultText.style.color = 'var(--text-muted)';
                resultText.style.fontStyle = 'italic';
                resultText.textContent = 'Нажмите "Распознать" для обработки';
                copyBtn.disabled = true;
            };
            reader.readAsDataURL(file);
        }
        
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            previewContainer.classList.remove('show');
            uploadZone.style.display = 'flex';
            processBtn.disabled = true;
            clearBtn.style.display = 'none';
            resultText.style.color = 'var(--text-muted)';
            resultText.style.fontStyle = 'italic';
            resultText.textContent = 'Загрузите изображение для распознавания текста';
            copyBtn.disabled = true;
        });
        
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            processBtn.disabled = true;
            clearBtn.disabled = true;
            progress.classList.add('show');
            hideError();
            resultText.style.color = 'var(--text-muted)';
            resultText.style.fontStyle = 'italic';
            resultText.textContent = 'Обработка...';
            
            try {
                const res = await fetch('/api/ocr', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.success) {
                    resultText.style.color = 'var(--text-primary)';
                    resultText.style.fontStyle = 'normal';
                    resultText.textContent = data.text || 'Текст не распознан';
                    copyBtn.disabled = false;
                } else {
                    showError(data.error || 'Ошибка распознавания');
                    resultText.textContent = 'Ошибка';
                }
            } catch (e) {
                showError('Ошибка соединения: ' + e.message);
                resultText.textContent = 'Ошибка';
            } finally {
                processBtn.disabled = false;
                clearBtn.disabled = false;
                progress.classList.remove('show');
            }
        });
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(resultText.textContent).then(() => {
                copyBtn.textContent = '✓ Скопировано';
                setTimeout(() => copyBtn.textContent = '📋 Копировать', 1500);
            });
        });
        
        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.add('show');
        }
        
        function hideError() {
            errorBox.classList.remove('show');
        }
    </script>
</body>
</html>
