<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-OCR — Распознавание текста</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #f5f5f7;
            --bg-card: rgba(255, 255, 255, 0.72);
            --bg-card-hover: rgba(255, 255, 255, 0.85);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #aeaeae;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 100%);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Subtle animated gradient orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }
        
        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #5ac8fa, #007aff);
            top: -200px;
            right: -100px;
            animation: drift1 25s ease-in-out infinite;
        }
        
        .bg-orb-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #34c759, #30d158);
            bottom: -150px;
            left: -100px;
            animation: drift2 30s ease-in-out infinite;
        }
        
        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, 30px) scale(1.1); }
        }
        
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.05); }
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            margin-bottom: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            font-size: 28px;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }
        
        .status-dot.ready {
            background: #34c759;
            box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.3);
        }
        
        .status-dot.error {
            background: #ff3b30;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.3);
        }
        
        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            flex: 1;
        }
        
        /* Card */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        
        .card-header {
            padding: 20px 24px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        
        .card-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        /* Upload Zone */
        .upload-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(0, 0, 0, 0.02);
        }
        
        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(0, 113, 227, 0.03);
        }
        
        .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(0, 113, 227, 0.05);
        }
        
        .upload-zone.has-image {
            display: none;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        
        .upload-text {
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        #file-input {
            display: none;
        }
        
        #preview-container {
            display: none;
            flex: 1;
            min-height: 0;
        }
        
        #preview-container.show {
            display: flex;
            flex-direction: column;
        }
        
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            flex: 1;
        }
        
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.08);
        }
        
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Progress */
        .progress {
            display: none;
            margin-top: 16px;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #5ac8fa);
            border-radius: 2px;
            animation: progress 1.5s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; margin-left: 0; }
            50% { width: 30%; margin-left: 35%; }
            100% { width: 0%; margin-left: 100%; }
        }
        
        /* Error */
        .error-box {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(255, 59, 48, 0.1);
            border-radius: 10px;
            color: #ff3b30;
            font-size: 14px;
        }
        
        .error-box.show {
            display: block;
        }
        
        /* Result */
        #result-text {
            flex: 1;
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            color: var(--text-primary);
            resize: none;
        }
        
        #result-text::-webkit-scrollbar {
            width: 8px;
        }
        
        #result-text::-webkit-scrollbar-track {
            background: transparent;
        }
        
        #result-text::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        /* Responsive */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            
            .container {
                padding: 16px;
            }
        }
        
        /* Selection */
        ::selection {
            background: rgba(0, 113, 227, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">GLM-OCR</span>
            </div>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Проверка...</span>
            </div>
        </header>
        
        <div class="main-grid">
            <div class="card">
                <div class="card-header">📷 Изображение</div>
                <div class="card-content">
                    <div class="upload-zone" id="upload-zone">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">Перетащите или нажмите</div>
                        <div class="upload-hint">PNG, JPG, WebP, GIF • до 20MB</div>
                        <input type="file" id="file-input" accept="image/*">
                    </div>
                    <div id="preview-container">
                        <img id="preview-image" alt="Предпросмотр">
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-primary" id="process-btn" disabled>🔍 Распознать</button>
                        <button class="btn btn-secondary" id="clear-btn" style="display:none">Отмена</button>
                    </div>
                    <div class="progress" id="progress">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                    </div>
                    <div class="error-box" id="error-box"></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">📝 Результат</div>
                <div class="card-content">
                    <div id="result-text">Загрузите изображение для распознавания</div>
                    <div class="btn-row">
                        <button class="btn btn-secondary" id="copy-btn" disabled>📋 Копировать</button>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            Powered by <a href="https://github.com/ggml-org/llama.cpp" target="_blank">llama.cpp</a> + <a href="https://huggingface.co/ggml-org/GLM-OCR-GGUF" target="_blank">GLM-OCR</a>
        </footer>
    </div>
    
    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const processBtn = document.getElementById('process-btn');
        const clearBtn = document.getElementById('clear-btn');
        const progress = document.getElementById('progress');
        const resultText = document.getElementById('result-text');
        const errorBox = document.getElementById('error-box');
        const copyBtn = document.getElementById('copy-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let selectedFile = null;
        
        async function checkHealth() {
            try {
                const res = await fetch('/api/health', { signal: AbortSignal.timeout(5000) });
                if (res.ok) {
                    statusDot.classList.add('ready');
                    statusText.textContent = 'Готов';
                    return;
                }
            } catch (e) {}
            statusDot.classList.remove('ready');
            statusText.textContent = 'Запуск...';
            setTimeout(checkHealth, 2000);
        }
        checkHealth();
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => uploadZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }));
        uploadZone.addEventListener('dragover', () => uploadZone.classList.add('dragover'));
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => { if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) return showError('Выберите изображение');
            if (file.size > 20 * 1024 * 1024) return showError('Максимум 20MB');
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                previewImage.src = e.target.result;
                previewContainer.classList.add('show');
                uploadZone.style.display = 'none';
                processBtn.disabled = false;
                clearBtn.style.display = 'block';
                hideError();
                resultText.textContent = 'Нажмите "Распознать"';
                copyBtn.disabled = true;
            };
            reader.readAsDataURL(file);
        }
        
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            previewContainer.classList.remove('show');
            uploadZone.style.display = 'flex';
            processBtn.disabled = true;
            clearBtn.style.display = 'none';
            resultText.textContent = 'Загрузите изображение';
            copyBtn.disabled = true;
        });
        
        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            const formData = new FormData();
            formData.append('file', selectedFile);
            processBtn.disabled = true;
            clearBtn.disabled = true;
            progress.classList.add('show');
            hideError();
            resultText.textContent = 'Обработка...';
            try {
                const res = await fetch('/api/ocr', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    resultText.textContent = data.text || 'Текст не найден';
                    copyBtn.disabled = false;
                } else {
                    showError(data.error || 'Ошибка');
                    resultText.textContent = 'Ошибка';
                }
            } catch (e) {
                showError('Ошибка соединения');
                resultText.textContent = 'Ошибка';
            } finally {
                processBtn.disabled = false;
                clearBtn.disabled = false;
                progress.classList.remove('show');
            }
        });
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(resultText.textContent).then(() => {
                copyBtn.textContent = '✓ Скопировано';
                setTimeout(() => copyBtn.textContent = '📋 Копировать', 1500);
            });
        });
        
        const showError = msg => { errorBox.textContent = msg; errorBox.classList.add('show'); };
        const hideError = () => { errorBox.classList.remove('show'); };
    </script>
</body>
</html>
