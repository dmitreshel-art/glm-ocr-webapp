# GLM-OCR WebApp Configuration
# Change MODEL_VARIANT to switch between quantizations

model:
  # Variant: Q8_0 or f16 (use lowercase!)
  # Note: mradermacher repo uses different naming than ggml-org
  # Q8_0: ~950 MB, 95-98% accuracy
  # f16: ~1.9 GB, 98-99% accuracy (better for handwriting, low quality)
  variant: f16
  
  # Context size (tokens)
  ctx_size: 16384
  
  # GPU layers to offload (99 = all layers)
  ngl: 99

# Server settings
server:
  host: "0.0.0.0"
  port: 8765