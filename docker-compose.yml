version: '3.8'

services:
  # ROCm-enabled llama.cpp server for AMD GPUs
  # Uncomment devices and environment to enable GPU acceleration
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: glm-ocr-llama
    ports:
      - "8765:8080"
    volumes:
      - ./hf-cache:/root/.cache/llama.cpp
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1  # Radeon 890M (Ryzen HX370)
    command: >
      -hf ggml-org/GLM-OCR-GGUF
      --port 8080
      --host 0.0.0.0
      --ctx-size 8192
      --n-gpu-layers 999
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Python web backend
  webapp:
    build: 
      context: .
      dockerfile: Dockerfile.web
    container_name: glm-ocr-web
    ports:
      - "8080:8080"
    volumes:
      - ./results:/app/results
    environment:
      - LLAMA_SERVER_URL=http://llama-server:8080
      - RESULTS_DIR=/app/results
    depends_on:
      - llama-server
    restart: unless-stopped