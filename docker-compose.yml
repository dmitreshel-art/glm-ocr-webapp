version: '3.8'

services:
  # llama.cpp server - reads config from ./config.yaml
  # Edit config.yaml to switch between Q8_0 and F16
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: glm-ocr-llama
    ports:
      - "8765:8080"
    volumes:
      - ./hf-cache:/root/.cache/llama.cpp
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - MODEL_VARIANT=${MODEL_VARIANT:-Q8_0}
    command: >
      -hf mradermacher/GLM-OCR-GGUF:GLM-OCR.f16.gguf
      --mmproj /root/.cache/llama/cpp/GLM-OCR.mmproj-f16.gguf
      --port 8080
      --host 0.0.0.0
      --ctx-size 16384
      --n-gpu-layers 0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Python web backend
  webapp:
    build: 
      context: .
      dockerfile: Dockerfile.web
    container_name: glm-ocr-web
    ports:
      - "8080:8080"
    volumes:
      - ./results:/app/results
    environment:
      - LLAMA_SERVER_URL=http://llama-server:8080
      - RESULTS_DIR=/app/results
    depends_on:
      - llama-server
    restart: unless-stopped