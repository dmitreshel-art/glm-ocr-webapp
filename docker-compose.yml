version: '3.8'

services:
  # Pre-built llama.cpp server with GLM-OCR model
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: glm-ocr-llama
    ports:
      - "8765:8080"
    volumes:
      - hf-cache:/root/.cache/llama.cpp
    command: >
      -hf ggml-org/GLM-OCR-GGUF
      --port 8080
      --host 0.0.0.0
      --ctx-size 4096
      --n-gpu-layers 0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Python web backend
  webapp:
    build: 
      context: .
      dockerfile: Dockerfile.web
    container_name: glm-ocr-web
    ports:
      - "8080:8080"
    environment:
      - LLAMA_SERVER_URL=http://llama-server:8080
    depends_on:
      - llama-server
    restart: unless-stopped

volumes:
  hf-cache: